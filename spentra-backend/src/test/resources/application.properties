# H2 In-Memory Database Configuration for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# HikariCP Connection Pool Settings for testing
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

# JPA/Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=my_secret_my_secret_my_secret_my_secret_my_secret_my_secret_my_secret_my_secret_my_secret_my_secret
jwt.expiration=2592000000

# CORS Configuration
app.allowed-origins=http://localhost:3000,http://localhost:5173
