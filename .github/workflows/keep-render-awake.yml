name: Keep Render Awake

on:
  schedule:
    # Run every 5 minutes to keep the Render free instance awake
    - cron: "*/5 * * * *"
  workflow_dispatch: # Allow manual execution

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        # Use curl to ping the /health endpoint. 
        # GitHub Actions cron can be delayed, so we do multiple pings
        # to ensure the backend truly warms up and stays awake.
        run: |
          echo "First ping..."
          curl --fail --silent --show-error https://spentra-backend.onrender.com/health || true

          echo "Waiting 30 seconds..."
          sleep 30

          echo "Second ping..."
          curl --fail --silent --show-error https://spentra-backend.onrender.com/health || true

          echo "Waiting 30 seconds..."
          sleep 30

          echo "Third ping..."
          curl --fail --silent --show-error https://spentra-backend.onrender.com/health || true
